display: &DISPLAY
  columnCount: 6
  aspectRatio: 1.65

config:
  meta:
    name: "e-shuushuu.net"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

homePage:
  config: &HOMEPAGE_CONFIG
    display:
      *DISPLAY
  chain:
    - onParseResult:
        contentType: "request"
        link: "https://e-shuushuu.net/${order}?page=${page}"
    - onParseResult: &HOMEPAGE_ONPARSERESULT
        list:
          getElements: { cssSelector: "div[class*='row-content']" }
          foreach:
            coverUrl:
              get: { cssSelector: "div[class*='thumbnail-container'] img", attr: "src" }
              format:
                - concat: { start: "https://e-shuushuu.net", end: "" }
            href:
              get: { cssSelector: "div[class*='thumbnail-container'] a", attr: "href" }
              format:
                - concat: { start: "https://e-shuushuu.net", end: "" }
            width:
              get: { cssSelector: "div[class*='meta-line secondary'] span", index: 0, text: "" }
              find:
                - regex: { regex: '^(\d+)\s*[×xX\*]\s*\d+$', index: 1 }
            height:
              get: { cssSelector: "div[class*='meta-line secondary'] span", index: 0, text: "" }
              find:
                - regex: { regex: '^\d+\s*[×xX\*]\s*(\d+)$', index: 1 }
            tagList:
              list:
                getElements: { cssSelector: "div[class*='tag-group'] a" }
                foreach:
                  desc:
                    get: { cssSelector: "", text: "" }
                  tag:
                    get: { cssSelector: "", attr: "href" }
                    format:
                      - replaceAll: { from: "/tags/", to: "" }
            id:
              get: { cssSelector: "div[class*='thumbnail-container'] a", attr: "data-image-id" }
            author:
              get: { cssSelector: "a[class*='username-link']", text: "" }
            authorId:
              get: { cssSelector: "a[class*='username-link']", attr: "href" }
              format:
                - replaceAll: { from: "/users/", to: "" }
            fileSize:
              get: { cssSelector: "div[class*='meta-line secondary'] span", index: 2, text: "" }
            dimensions:
              get: { cssSelector: "div[class*='meta-line secondary'] span", index: 0, text: "" }

searchPage:
  config:
    *HOMEPAGE_CONFIG
  chain:
    - onParseResult:
        contentType: "request"
        link: "https://e-shuushuu.net/search?page=${page}&tags=${keyword}"
    - onParseResult:
        *HOMEPAGE_ONPARSERESULT

detailPage:
  chain:
    - onParseResult:
        object:
          url:
            get: { cssSelector: "div[class*='image-container'] img", attr: "src" }
          tags:
            list:
              getElements: { cssSelector: "div[class*='tag-group'] a" }
              foreach:
                desc:
                  get: { cssSelector: "", text: "" }
                tag:
                  get: { cssSelector: "", attr: "href" }
                  format:
                    - replaceAll: { from: "/tags/", to: "" }

authorPage:
  config:
    *HOMEPAGE_CONFIG
  chain:
    - onParseResult:
        contentType: "request"
        link: "https://e-shuushuu.net/search?page=${page}&tags=${authorId}"
    - onParseResult:
        *HOMEPAGE_ONPARSERESULT